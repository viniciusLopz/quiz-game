<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>quiz-game</title>
</head>

<body>
  <section id="tela-inicio">
    <h1>Bem vindo ao Quiz Game</h1>
    <input type="text" id="nome-jogador" placeholder="Digite seu nome">
    <button id="botao-iniciar">Iniciar jogo</button>
  </section>

  <section id="tela-pergunta">
    <h2 id="pergunta">Aqui aparece a pergunta</h2>
    <div id="alternativas">
      <button class="alternativa">Alternativa 1</button>
      <button class="alternativa">Alternativa 2</button>
      <button class="alternativa">Alternativa 3</button>
      <button class="alternativa">Alternativa 4</button>
    </div>
    <h3 id="pontuacao-atual">Pontuacao atual: </h3>
    <h3 id="pontuacao-valendo">Pergunta valendo: </h3>
  </section>

  <section id="tela-fim">
    <h2 id="placar-final">A sua pontuacao final foi: </h2>
    <h3 id="pontuacao-final">0</h3>
    <button id="jogar-novamente">Jogar novamente</button>
  </section>
</body>

</html>
